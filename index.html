<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO - Ethereal Biometric Mirror</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #030307; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }
        
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: radial-gradient(circle, rgba(15,20,35,0.98) 0%, rgba(3,3,7,1) 100%); transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #startBtn { padding: 22px 55px; font-size: 16px; font-weight: 300; color: #00e5ff; background: transparent; border: 1px solid rgba(0,229,255,0.3); cursor: pointer; transition: all 0.5s ease; letter-spacing: 6px; border-radius: 50px; }
        #startBtn:hover { background: rgba(0,229,255,0.08); border-color: #00e5ff; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        #status { margin-top: 30px; color: rgba(0, 229, 255, 0.4); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <button id="startBtn">ATTIVA FLUSSO ARMONICO</button>
    <div id="status">SISTEMA BIO-ELETTRONICO PRONTO // CALIBRATO</div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay = document.getElementById('ui-overlay');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    let dataNodes = [];
    let audioCtx, masterGain, carrierOsc, modulatorOsc, modGain, filterNode, delayNode, feedbackGain;
    
    // Struttura parametri flessibili e armonici (Intervalli rilassanti)
    let currentStyle = { hue: 195, lineDensity: 40, baseFreq: 220, modFreq: 0.5, modGain: 2, filterFreq: 1200 };
    let targetStyle = { hue: 195, lineDensity: 40, baseFreq: 220, modFreq: 0.5, modGain: 2, filterFreq: 1200 };

    // Mappatura completa del volto: include occhi, sopracciglia, contorno labbra e la linea degli zigomi
    const CYBER_MAP = [
        10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, // Contorno Ovale
        33, 160, 158, 133, 153, 144, 362, 385, 387, 263, 373, 380, // Occhi integrali
        70, 63, 105, 66, 107, 336, 296, 334, 293, 300, // Sopracciglia
        61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, // Labbra esterne ed interne
        50, 117, 118, 123, 147, 280, 346, 347, 352, 376 // Struttura volumetrica degli Zigomi
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;
    resize();

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMesh.onResults(onEtherealBiometrics);

    startBtn.onclick = async () => {
        statusText.innerText = "GENERAZIONE SPAZIO SONORO IPNOTICO...";
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            setupAmbientSynth();

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                uiOverlay.style.opacity = '0';
                setTimeout(() => uiOverlay.style.display = 'none', 1200);
                
                cameraProcessingLoop();
                renderCyberSpace();
            };
        } catch (err) {
            statusText.style.color = "#ff3366";
            statusText.innerText = `LINK_FAILED: ${err.message.toUpperCase()}`;
        }
    };

    async function cameraProcessingLoop() {
        if (video.readyState === 4) await faceMesh.send({ image: video });
        requestAnimationFrame(cameraProcessingLoop);
    }

    // Sintetizzatore Zen / Ambient (Onde pure, risonanze morbide, eco profondo)
    function setupAmbientSynth() {
        carrierOsc = audioCtx.createOscillator();
        modulatorOsc = audioCtx.createOscillator();
        modGain = audioCtx.createGain();
        filterNode = audioCtx.createBiquadFilter();
        masterGain = audioCtx.createGain();
        delayNode = audioCtx.createDelay();
        feedbackGain = audioCtx.createGain();

        // Onde sinusoidali pure: eliminano qualsiasi asprezza o distorsione
        carrierOsc.type = 'sine';
        modulatorOsc.type = 'sine';
        
        // Filtro molto dolce (Q basso) per simulare un'atmosfera acquatica o aerea
        filterNode.type = 'lowpass';
        filterNode.Q.setValueAtTime(2.0, audioCtx.currentTime); 

        delayNode.delayTime.value = 0.6; // Eco lungo da cattedrale o spazio aperto
        feedbackGain.gain.value = 0.55;  
        masterGain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Volume morbido di sottofondo

        modulatorOsc.connect(modGain);
        modGain.connect(carrierOsc.frequency);
        carrierOsc.connect(filterNode);
        filterNode.connect(masterGain);
        
        masterGain.connect(audioCtx.destination);
        masterGain.connect(delayNode);
        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);
        delayNode.connect(audioCtx.destination);

        carrierOsc.start();
        modulatorOsc.start();
    }

    // --- ANALISI INTEGRALE RIGOROSA DI TUTTI I DISTRETTI FACCIALI ---
    function onEtherealBiometrics(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
        
        const lm = results.multiFaceLandmarks[0];

        // 1. OCCHI (Apertura palpebrale ad altissima sensibilità)
        const eyeLeft = Math.abs(lm[159].y - lm[145].y);
        const eyeRight = Math.abs(lm[386].y - lm[374].y);
        const eyeFactor = Math.min(Math.max(((eyeLeft + eyeRight) / 2 - 0.012) / 0.020, 0), 1);

        // 2. LABBRA (Apertura bocca e larghezza sorriso)
        const mouthOpen = Math.abs(lm[13].y - lm[14].y);
        const mouthWidth = Math.abs(lm[61].x - lm[291].x);
        const jawFactor = Math.min(Math.max(mouthOpen / 0.07, 0), 1);
        const smileFactor = Math.min(Math.max((mouthWidth - 0.12) / 0.06, 0), 1);

        // 3. SOPRACCIGLIA (Contrazione centrale / Sollevamento)
        const browDist = Math.abs(lm[55].x - lm[285].x);
        const browHeight = Math.abs(lm[70].y - lm[159].y);
        const frownFactor = Math.min(Math.max((0.21 - browDist) / 0.05, 0), 1); // Vicinanza (corrugamento)
        const liftFactor = Math.min(Math.max((browHeight - 0.04) / 0.03, 0), 1);   // Sollevamento per stupore

        // 4. ZIGOMI (Innalzamento delle guance)
        // Calcolato misurando lo spostamento verticale dello zigomo rispetto alla base dell'occhio
        const leftCheekLift = Math.abs(lm[145].y - lm[50].y);
        const rightCheekLift = Math.abs(lm[374].y - lm[280].y);
        const avgCheekDist = (leftCheekLift + rightCheekLift) / 2;
        // Quando sorridi o contrai il viso, lo zigomo sale verso l'occhio (la distanza si riduce)
        const cheekFactor = Math.min(Math.max((0.085 - avgCheekDist) / 0.025, 0), 1);

        // --- COREOGRAFIA SONORA MEDITATIVA ED ETREA ---
        
        // Pitch Fondamentale: Tarato su frequenze armoniche geometriche ben definite (220Hz, LA centrale)
        // Il sorriso e lo zigomo alto alzano la nota in una perfetta quinta musicale. La tensione la abbassa dolcemente.
        targetStyle.baseFreq = 220 + (smileFactor * 110) + (cheekFactor * 55) - (frownFactor * 30);
        
        // Frequenza di Modulazione (Il "Vibrare" dell'aria): 
        // Legatissimo agli occhi. Occhi chiusi = rilassamento immobile (0.2Hz). Occhi spalancati = onde fluttuanti cristalline.
        targetStyle.modFreq = 0.2 + (eyeFactor * 3.5) + (liftFactor * 2);
        
        // Profondità dell'Onda (Espansione dello spettro):
        // Lo zigomo e le labbra modificano la morbidezza del tono senza mai creare distorsione.
        targetStyle.modGain = 2 + (cheekFactor * 15) + (jawFactor * 10);
        
        // Il Filtro "Oceano" (Swell delle frequenze alte):
        // Muovendo la bocca o spalancando gli occhi, il suono si apre come una brezza marina soffice (fino a 2200Hz).
        // Quando chiudi gli occhi o ti rilassi, il suono si spegne in un sussurro scuro e calmo.
        targetStyle.filterFreq = 400 + (eyeFactor * 1200) + (jawFactor * 800) + (liftFactor * 400);

        // --- MAPPA ESTETICA VISIVA (Ciano, Zaffiro, Smeraldo, Oro Bianco) ---
        let baseHue = 195; // Ciano Etereo di base
        if (smileFactor > 0.05) baseHue = baseHue * (1 - smileFactor) + 150 * smileFactor; // Smeraldo rilassante
        if (cheekFactor > 0.1) baseHue = baseHue * (1 - cheekFactor) + 45 * cheekFactor;   // Luce calda dorata
        if (frownFactor > 0.05) baseHue = baseHue * (1 - frownFactor) + 230 * frownFactor; // Blu zaffiro profondo
