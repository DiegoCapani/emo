<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO - Ethereal Live Core</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #030307; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }
        
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: radial-gradient(circle, rgba(15,20,35,0.98) 0%, rgba(3,3,7,1) 100%); transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #startBtn { padding: 22px 55px; font-size: 16px; font-weight: 300; color: #00e5ff; background: transparent; border: 1px solid rgba(0,229,255,0.3); cursor: pointer; transition: all 0.5s ease; letter-spacing: 6px; border-radius: 50px; text-transform: uppercase; }
        #startBtn:hover { background: rgba(0,229,255,0.08); border-color: #00e5ff; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        #status { margin-top: 30px; color: rgba(0, 229, 255, 0.4); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; text-align: center; max-width: 80%; line-height: 1.6; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <button id="startBtn">INIZIA ESPERIENZA</button>
    <div id="status">IN ATTESA DEL COLLEGAMENTO BIOMETRICO...</div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay = document.getElementById('ui-overlay');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    let dataNodes = [];
    let audioCtx, masterGain, carrierOsc, modulatorOsc, modGain, filterNode, delayNode, feedbackGain;
    
    let currentStyle = { hue: 195, lineDensity: 40, baseFreq: 220, modFreq: 0.5, modGain: 2, filterFreq: 1200 };
    let targetStyle = { hue: 195, lineDensity: 40, baseFreq: 220, modFreq: 0.5, modGain: 2, filterFreq: 1200 };

    const CYBER_MAP = [
        10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162,
        33, 160, 158, 133, 153, 144, 362, 385, 387, 263, 373, 380,
        70, 63, 105, 66, 107, 336, 296, 334, 293, 300,
        61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95,
        50, 117, 118, 123, 147, 280, 346, 347, 352, 376
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;
    resize();

    // Configurazione HTTPS sicura per il cloud
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMesh.onResults(onEtherealBiometrics);

    startBtn.onclick = async () => {
        // Controllo HTTPS preventivo online
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            statusText.style.color = "#ff3366";
            statusText.innerHTML = "ERRORE CRITICO: I browser bloccano la fotocamera online se il sito non usa HTTPS.<br>Trasferisci il file su un hosting sicuro (SSL/HTTPS).";
            return;
        }

        statusText.innerText = "CONFIGURAZIONE AUDIO E RETE NEURALE IN CORSO...";
        
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            setupAmbientSynth();

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                uiOverlay.style.opacity = '0';
                setTimeout(() => uiOverlay.style.display = 'none', 1200);
                
                cameraProcessingLoop();
                renderCyberSpace();
            };
        } catch (err) {
            statusText.style.color = "#ff3366";
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                statusText.innerText = "ERRORE: Accesso alla fotocamera negato. Controlla i permessi del tuo browser.";
            } else {
                statusText.innerText = `ERRORE ONLINE: ${err.name} - ${err.message}`;
            }
            console.error(err);
        }
    };

    async function cameraProcessingLoop() {
        if (video.readyState === 4) {
            try {
                await faceMesh.send({ image: video });
            } catch (e) {
                console.error("Errore di elaborazione frame cloud:", e);
            }
        }
        requestAnimationFrame(cameraProcessingLoop);
    }

    function setupAmbientSynth() {
        carrierOsc = audioCtx.createOscillator();
        modulatorOsc = audioCtx.createOscillator();
        modGain = audioCtx.createGain();
        filterNode = audioCtx.createBiquadFilter();
        masterGain = audioCtx.createGain();
        delayNode = audioCtx.createDelay();
        feedbackGain = audioCtx.createGain();

        carrierOsc.type = 'sine';
        modulatorOsc.type = 'sine';
        
        filterNode.type = 'lowpass';
        filterNode.Q.setValueAtTime(2.0, audioCtx.currentTime); 

        delayNode.delayTime.value = 0.6; 
        feedbackGain.gain.value = 0.55;  
        masterGain.gain.setValueAtTime(0.08, audioCtx.currentTime); 

        modulatorOsc.connect(modGain);
        modGain.connect(carrierOsc.frequency);
        carrierOsc.connect(filterNode);
        filterNode.connect(masterGain);
        
        masterGain.connect(audioCtx.destination);
        masterGain.connect(delayNode);
        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);
        delayNode.connect(audioCtx.destination);

        carrierOsc.start();
        modulatorOsc.start();
    }

    function onEtherealBiometrics(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
        
        const lm = results.multiFaceLandmarks[0];

        // Mappatura sensoriale avanzata (Tutti i muscoli del viso)
        const eyeLeft = Math.abs(lm[159].y - lm[145].y);
        const eyeRight = Math.abs(lm[386].y - lm[374].y);
        const eyeFactor = Math.min(Math.max(((eyeLeft + eyeRight) / 2 - 0.012) / 0.020, 0), 1);

        const mouthOpen = Math.abs(lm[13].y - lm[14].y);
        const mouthWidth = Math.abs(lm[61].x - lm[291].x);
        const jawFactor = Math.min(Math.max(mouthOpen / 0.07, 0), 1);
        const smileFactor = Math.min(Math.max((mouthWidth - 0.12) / 0.06, 0), 1);

        const browDist = Math.abs(lm[55].x - lm[285].x);
        const browHeight = Math.abs(lm[70].y - lm[159].y);
        const frownFactor = Math.min(Math.max((0.21 - browDist) / 0.05, 0), 1); 
        const liftFactor = Math.min(Math.max((browHeight - 0.04) / 0.03, 0), 1);   

        const leftCheekLift = Math.abs(lm[145].y - lm[50].y);
        const rightCheekLift = Math.abs(lm[374].y - lm[280].y);
        const avgCheekDist = (leftCheekLift + rightCheekLift) / 2;
        const cheekFactor = Math.min(Math.max((0.085 - avgCheekDist) / 0.025, 0), 1);

        // Algoritmi di sintesi sonora rilassante e continua
        targetStyle.baseFreq = 220 + (smileFactor * 110) + (cheekFactor * 55) - (frownFactor * 30);
        targetStyle.modFreq = 0.2 + (eyeFactor * 3.5) + (liftFactor * 2);
        targetStyle.modGain = 2 + (cheekFactor * 15) + (jawFactor * 10);
        targetStyle.filterFreq = 400 + (eyeFactor * 1200) + (jawFactor * 800) + (liftFactor * 400);

        // Variazioni cromatiche ambient (Smeraldo, Zaffiro, Oro, Ciano)
        let baseHue = 195; 
        if (smileFactor > 0.05) baseHue = baseHue * (1 - smileFactor) + 150 * smileFactor; 
        if (cheekFactor > 0.1) baseHue = baseHue * (1 - cheekFactor) + 45 * cheekFactor;   
        if (frownFactor > 0.05) baseHue = baseHue * (1 - frownFactor) + 230 * frownFactor; 
        targetStyle.hue = baseHue;
        targetStyle.lineDensity = 30 + (eyeFactor * 25) + (cheekFactor * 20);

        dataNodes = CYBER_MAP.map(index => {
            return { x: (1 - lm[index].x) * canvas.width, y: lm[index].y * canvas.height };
        });
    }

    function renderCyberSpace() {
        ctx.fillStyle = 'rgba(3, 3, 7, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        currentStyle.hue += (targetStyle.hue - currentStyle.hue) * 0.05;
        currentStyle.lineDensity += (targetStyle.lineDensity - currentStyle.lineDensity) * 0.05;
        
        currentStyle.baseFreq += (targetStyle.baseFreq - currentStyle.baseFreq) * 0.05;
        currentStyle.modFreq += (targetStyle.modFreq - currentStyle.modFreq) * 0.05;
        currentStyle.modGain += (targetStyle.modGain - currentStyle.modGain) * 0.05;
        currentStyle.filterFreq += (targetStyle.filterFreq - currentStyle.filterFreq) * 0.05;

        if (audioCtx && carrierOsc) {
            carrierOsc.frequency.setTargetAtTime(currentStyle.baseFreq, audioCtx.currentTime, 0.04);
            modulatorOsc.frequency.setTargetAtTime(currentStyle.modFreq, audioCtx.currentTime, 0.04);
            modGain.gain.setTargetAtTime(currentStyle.modGain, audioCtx.currentTime, 0.04);
            filterNode.frequency.setTargetAtTime(currentStyle.filterFreq, audioCtx.currentTime, 0.04);
        }

        const nodesLength = dataNodes.length;

        if (nodesLength > 0) {
            ctx.lineWidth = 0.6;
            for (let i = 0; i < nodesLength; i++) {
                for (let j = i + 1; j < nodesLength; j++) {
                    let dist = Math.hypot(dataNodes[i].x - dataNodes[j].x, dataNodes[i].y - dataNodes[j].y);
                    
                    if (dist < currentStyle.lineDensity) {
                        let opacity = (1 - (dist / currentStyle.lineDensity)) * 0.22;
                        ctx.strokeStyle = `hsla(${currentStyle.hue}, 90%, 65%, ${opacity})`;
                        ctx.beginPath();
                        ctx.moveTo(dataNodes[i].x, dataNodes[j].y);
                        ctx.lineTo(dataNodes[j].x, dataNodes[i].y);
                        ctx.stroke();
                    }
                }
            }

            for (let i = 0; i < nodesLength; i++) {
                ctx.fillStyle = `hsla(${currentStyle.hue}, 100%, 75%, 0.5)`;
                ctx.beginPath();
                ctx.arc(dataNodes[i].x, dataNodes[i].y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        requestAnimationFrame(renderCyberSpace);
    }
</script>
</body>
</html>
