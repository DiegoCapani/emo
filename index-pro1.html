<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO - Specchio dell'Anima</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }
        
        /* Interfaccia Utente Museale */
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: rgba(5,5,5,0.9); transition: all 0.8s ease; }
        #startBtn { padding: 20px 50px; font-size: 20px; font-weight: 300; letter-spacing: 4px; color: #ffffff; background: transparent; border: 1px solid rgba(255,255,255,0.4); cursor: pointer; transition: all 0.4s; border-radius: 4px; }
        #startBtn:hover { background: #ffffff; color: #000000; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        #status { margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <button id="startBtn">INIZIA ESPERIENZA</button>
    <div id="status">Inizializzazione sistema IA...</div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay = document.getElementById('ui-overlay');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    let particles = [];
    let audioCtx, oscillator, filter, gainNode;
    let currentEmotion = { hue: 160, speed: 2, size: 3, tone: 220, force: 0.05 };

    // 1. Gestione Canvas Responsivo
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;
    resize();

    // 2. Setup del Modello FaceMesh (Caricamento asset core da CDN)
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    statusText.innerText = "Pronto. Clicca per attivare la postazione.";

    // 3. Attivazione al Click dell'Utente
    startBtn.onclick = async () => {
        statusText.innerText = "Richiesta accesso alla telecamera...";
        try {
            // Setup Audio Nativo
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setupAudio();

            // Attivazione nativa della Webcam senza librerie esterne
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            // Quando il video riceve i dati, avvia l'esperienza
            video.onloadedmetadata = () => {
                video.play();
                uiOverlay.style.opacity = '0';
                setTimeout(() => uiOverlay.style.display = 'none', 800);
                
                // Avvio dei due loop paralleli (Logica IA e Grafica Generativa)
                cameraLoop();
                drawLoop();
            };
        } catch (err) {
            statusText.style.color = "#ff4444";
            statusText.innerText = `ERRORE: ${err.message}. Controlla i permessi del browser o assicurati di essere su un sito HTTPS sicuro.`;
        }
    };

    // 4. Loop di cattura e invio frame all'IA (Sostituisce il vecchio "Camera")
    async function cameraLoop() {
        if (video.readyState === 4) { // 4 = HAVE_ENOUGH_DATA
            try {
                await faceMesh.send({ image: video });
            } catch (e) {
                console.error("Errore elaborazione frame IA:", e);
            }
        }
        // Richiede il prossimo frame non appena il browser è pronto, mantenendo alti gli FPS
        requestAnimationFrame(cameraLoop);
    }

    // 5. Sintetizzatore Audio Procedurale Nativo
    function setupAudio() {
        oscillator = audioCtx.createOscillator();
        filter = audioCtx.createBiquadFilter();
        gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
        filter.type = 'lowpass';
        gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); 

        oscillator.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
    }

    // 6. Analisi dei Punti Facciali e Classificazione Emozioni
    function onResults(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
        
        const lm = results.multiFaceLandmarks[0];

        // Calcolo delle distanze relative dei punti chiave del viso
        const mouthOpen = Math.abs(lm[13].y - lm[14].y) * 100;
        const mouthWidth = Math.abs(lm[61].x - lm[291].x) * 100;
        const eyeOpen = (Math.abs(lm[159].y - lm[145].y) + Math.abs(lm[386].y - lm[374].y)) * 50;
        const browDistance = Math.abs(lm[55].x - lm[285].x) * 100;

        // Mappatura degli stati d'animo
        if (mouthWidth > 16.5 && eyeOpen > 2.5) { 
            // FELICITÀ
            currentEmotion = { hue: 45, speed: 6, size: 7, tone: 392, force: 0.3 };
        } else if (browDistance < 18 && mouthOpen > 1.5) { 
            // IRA / TENSIONE
            currentEmotion = { hue: 0, speed: 12, size: 10, tone: 110, force: 0.7 };
        } else if (mouthOpen > 5) { 
            // SORPRESA
            currentEmotion = { hue: 300, speed: 9, size: 4, tone: 523, force: 0.5 };
        } else if (mouthWidth < 13.8) { 
            // TRISTEZZA
            currentEmotion = { hue: 210, speed: 1.5, size: 5, tone: 130, force: 0.1 };
        } else { 
            // CALMA / NOIA
            currentEmotion = { hue: 160, speed: 2, size: 3, tone: 196, force: 0.05 };
        }

        // Modulazione audio in tempo reale basata sui dati reali
        if (audioCtx) {
            oscillator.frequency.setTargetAtTime(currentEmotion.tone + (mouthOpen * 15), audioCtx.currentTime, 0.1);
            filter.frequency.setTargetAtTime(300 + (eyeOpen * 400), audioCtx.currentTime, 0.1);
        }

        // Generazione particelle (Inversione asse X per effetto specchio)
        const faceX = (1 - lm[1].x) * canvas.width;
        const faceY = lm[1].y * canvas.height;
        
        for (let i = 0; i < Math.floor(currentEmotion.speed / 2) + 1; i++) {
            particles.push({
                x: faceX,
                y: faceY,
                vx: (Math.random() - 0.5) * currentEmotion.speed * 2,
                vy: (Math.random() - 0.5) * currentEmotion.speed * 2 - (currentEmotion.hue === 210 ? -1.5 : 0),
                alpha: 1,
                size: Math.random() * currentEmotion.size + 2,
                hue: currentEmotion.hue + (Math.random() * 16 - 8)
            });
        }
    }

    // 7. Loop di Rendering dell'Arte Visiva (Canvas 60 FPS)
    function drawLoop() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.08)'; // Effetto scia pittorico
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.012;

            if (p.alpha <= 0) {
                particles.splice(i, 1);
                continue;
            }

            ctx.shadowBlur = currentEmotion.force * 12;
            ctx.shadowColor = `hsl(${p.hue}, 100%, 50%)`;
            ctx.fillStyle = `hsla(${p.hue}, 100%, 50%, ${p.alpha})`;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.shadowBlur = 0; 
        requestAnimationFrame(drawLoop);
    }
</script>
</body>
</html>
